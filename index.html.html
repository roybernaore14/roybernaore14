<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNEAKER CONTROL - Gestión de Inventario</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --success: #10b981;
            --success-dark: #059669;
            --danger: #ef4444;
            --warning: #f59e0b;
            --background: #f8fafc;
            --surface: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --radius: 12px;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--background);
            color: var(--text-main);
            padding: 20px;
            line-height: 1.5;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* --- HEADER --- */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            background: var(--surface);
            padding: 20px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
        }

        .logo h1 {
            font-size: 24px;
            font-weight: 700;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo span {
            color: var(--text-main);
        }

        /* --- DASHBOARD PANELS --- */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 24px;
        }

        .card {
            background: var(--surface);
            padding: 20px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .card-icon {
            width: 50px;
            height: 50px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: white;
        }

        .card-info .value {
            font-size: 22px;
            font-weight: 700;
        }

        .card-info .label {
            font-size: 14px;
            color: var(--text-muted);
        }

        .bg-blue { background-color: var(--primary); }
        .bg-green { background-color: var(--success); }
        .bg-amber { background-color: var(--warning); }
        .bg-red { background-color: var(--danger); }

        /* --- MAIN CONTENT LAYOUT --- */
        .main-layout {
            display: grid;
            grid-template-columns: 1fr 340px;
            gap: 24px;
        }

        @media (max-width: 1024px) {
            .main-layout {
                grid-template-columns: 1fr;
            }
        }

        /* --- ACTIONS & FILTERS --- */
        .table-actions {
            background: var(--surface);
            padding: 16px;
            border-radius: var(--radius) var(--radius) 0 0;
            border-bottom: 1px solid var(--border);
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            justify-content: space-between;
            align-items: center;
        }

        .search-box {
            position: relative;
            flex: 1;
            min-width: 260px;
        }

        .search-box i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        .search-box input {
            width: 100%;
            padding: 10px 14px 10px 40px;
            border: 1px solid var(--border);
            border-radius: 8px;
            outline: none;
            font-size: 14px;
        }

        .filter-box select {
            padding: 10px 14px;
            border: 1px solid var(--border);
            border-radius: 8px;
            outline: none;
            background-color: var(--surface);
            font-size: 14px;
        }

        /* --- INVENTORY TABLE --- */
        .table-container {
            background: var(--surface);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .table-wrapper {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            font-size: 14px;
        }

        th {
            background-color: #f1f5f9;
            color: var(--text-muted);
            padding: 14px 16px;
            font-weight: 600;
            white-space: nowrap;
        }

        td {
            padding: 14px 16px;
            border-bottom: 1px solid var(--border);
            white-space: nowrap;
        }

        tr:hover td {
            background-color: #f8fafc;
        }

        .badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
        }

        .badge-danger { background-color: #fee2e2; color: var(--danger); }
        .badge-success { background-color: #d1fae5; color: var(--success); }
        .badge-warning { background-color: #fef3c7; color: var(--warning); }

        /* --- FORMS SIDEBAR --- */
        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .form-card {
            background: var(--surface);
            padding: 20px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
        }

        .form-card h2 {
            font-size: 16px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-main);
            border-bottom: 2px solid var(--border);
            padding-bottom: 8px;
        }

        .form-group {
            margin-bottom: 14px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 6px;
            color: var(--text-muted);
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 6px;
            outline: none;
            font-size: 14px;
        }

        .form-group input:focus, .form-group select:focus {
            border-color: var(--primary);
        }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            transition: background 0.2s;
        }

        .btn-success { background-color: var(--success); color: white; }
        .btn-success:hover { background-color: var(--success-dark); }
        .btn-danger { background-color: var(--danger); color: white; }
        .btn-danger:hover { background-color: #dc2626; }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <div class="logo">
                <h1><i class="fas fa-shoe-prints"></i> SNEAKER<span>CONTROL</span></h1>
            </div>
            <div class="date-status">
                <span id="current-date" style="color: var(--text-muted); font-size: 14px;"></span>
            </div>
        </header>

        <div class="dashboard-grid">
            <div class="card">
                <div class="card-icon bg-blue"><i class="fas fa-boxes"></i></div>
                <div class="card-info">
                    <div class="value" id="kpi-total-models">0</div>
                    <div class="label">Modelos Distintos</div>
                </div>
            </div>
            <div class="card">
                <div class="card-icon bg-green"><i class="fas fa-warehouse"></i></div>
                <div class="card-info">
                    <div class="value" id="kpi-total-stock">0</div>
                    <div class="label">Total Unidades Stock</div>
                </div>
            </div>
            <div class="card">
                <div class="card-icon bg-amber"><i class="fas fa-sign-in-alt"></i></div>
                <div class="card-info">
                    <div class="value" id="kpi-total-inputs">0</div>
                    <div class="label">Total Entradas</div>
                </div>
            </div>
            <div class="card">
                <div class="card-icon bg-red"><i class="fas fa-sign-out-alt"></i></div>
                <div class="card-info">
                    <div class="value" id="kpi-total-outputs">0</div>
                    <div class="label">Total Salidas</div>
                </div>
            </div>
            <div class="card">
                <div class="card-icon bg-green" style="background-color: #0284c7;"><i class="fas fa-dollar-sign"></i></div>
                <div class="card-info">
                    <div class="value" id="kpi-total-profit">S/. 0.00</div>
                    <div class="label">Ganancia Potencial</div>
                </div>
            </div>
        </div>

        <div class="main-layout">
            
            <div class="table-container">
                <div class="table-actions">
                    <div class="search-box">
                        <i class="fas fa-search"></i>
                        <input type="text" id="search-input" placeholder="Buscar por marca o modelo...">
                    </div>
                    <div class="filter-box">
                        <select id="filter-stock">
                            <option value="all">Todos los niveles de Stock</option>
                            <option value="low">Stock Bajo (Menos de 5 u.)</option>
                            <option value="ok">Stock Óptimo</option>
                        </select>
                    </div>
                </div>

                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th>Código</th>
                                <th>Marca</th>
                                <th>Modelo</th>
                                <th>Talla</th>
                                <th>Color</th>
                                <th>P. Compra</th>
                                <th>P. Venta</th>
                                <th>Stock Ini.</th>
                                <th>Entradas</th>
                                <th>Salidas</th>
                                <th>Stock Act.</th>
                                <th>Estado</th>
                            </tr>
                        </thead>
                        <tbody id="inventory-tbody">
                            </tbody>
                    </table>
                </div>
            </div>

            <div class="sidebar">
                <div class="form-card">
                    <h2><i class="fas fa-plus-circle" style="color: var(--success);"></i> Registrar Entrada</h2>
                    <form id="form-entrada">
                        <div class="form-group">
                            <label for="input-product-code">Seleccionar Zapatilla</label>
                            <select id="input-product-code" required>
                                </select>
                        </div>
                        <div class="form-group">
                            <label for="input-quantity">Cantidad de Unidades</label>
                            <input type="number" id="input-quantity" min="1" required placeholder="Ej. 10">
                        </div>
                        <button type="submit" class="btn btn-success">
                            <i class="fas fa-check"></i> Aplicar Entrada
                        </button>
                    </form>
                </div>

                <div class="form-card">
                    <h2><i class="fas fa-minus-circle" style="color: var(--danger);"></i> Registrar Salida</h2>
                    <form id="form-salida">
                        <div class="form-group">
                            <label for="output-product-code">Seleccionar Zapatilla</label>
                            <select id="output-product-code" required>
                                </select>
                        </div>
                        <div class="form-group">
                            <label for="output-quantity">Cantidad de Unidades</label>
                            <input type="number" id="output-quantity" min="1" required placeholder="Ej. 2">
                        </div>
                        <button type="submit" class="btn btn-danger">
                            <i class="fas fa-shopping-cart"></i> Aplicar Salida
                        </button>
                    </form>
                </div>
            </div>

        </div>
    </div>

    <script>
        // DATASET INICIAL: 20 Productos del nicho de Zapatillas
        let inventory = [
            { code: "ZAP-001", brand: "Nike", model: "Air Force 1", size: "41", color: "Blanco", buyPrice: 220, sellPrice: 380, initialStock: 12, inputs: 0, outputs: 0 },
            { code: "ZAP-002", brand: "Nike", model: "Air Max 90", size: "42", color: "Negro/Gris", buyPrice: 280, sellPrice: 450, initialStock: 8, inputs: 0, outputs: 0 },
            { code: "ZAP-003", brand: "Adidas", model: "Ultraboost Light", size: "40", color: "Negro", buyPrice: 350, sellPrice: 590, initialStock: 3, inputs: 0, outputs: 0 },
            { code: "ZAP-004", brand: "Adidas", model: "Samba OG", size: "39", color: "Blanco/Negro", buyPrice: 180, sellPrice: 320, initialStock: 15, inputs: 0, outputs: 0 },
            { code: "ZAP-005", brand: "Puma", model: "Suede Classic", size: "42", color: "Azul", buyPrice: 140, sellPrice: 260, initialStock: 7, inputs: 0, outputs: 0 },
            { code: "ZAP-006", brand: "Puma", model: "RS-X Triple", size: "43", color: "Gris/Rojo", buyPrice: 200, sellPrice: 390, initialStock: 2, inputs: 0, outputs: 0 },
            { code: "ZAP-007", brand: "Jordan", model: "Air Jordan 1 Mid", size: "41", color: "Rojo/Negro", buyPrice: 320, sellPrice: 550, initialStock: 6, inputs: 0, outputs: 0 },
            { code: "ZAP-008", brand: "New Balance", model: "550 White", size: "42", color: "Blanco/Verde", buyPrice: 240, sellPrice: 420, initialStock: 10, inputs: 0, outputs: 0 },
            { code: "ZAP-009", brand: "New Balance", model: "9060 Quartz", size: "40", color: "Beige", buyPrice: 380, sellPrice: 620, initialStock: 4, inputs: 0, outputs: 0 },
            { code: "ZAP-010", brand: "Vans", model: "Old Skool", size: "38", color: "Negro/Blanco", buyPrice: 110, sellPrice: 210, initialStock: 20, inputs: 0, outputs: 0 },
            { code: "ZAP-011", brand: "Converse", model: "Chuck Taylor 70", size: "41", color: "Negro", buyPrice: 130, sellPrice: 240, initialStock: 14, inputs: 0, outputs: 0 },
            { code: "ZAP-012", brand: "Asics", model: "Gel-Kayano 14", size: "43", color: "Plata/Azul", buyPrice: 310, sellPrice: 520, initialStock: 5, inputs: 0, outputs: 0 },
            { code: "ZAP-013", brand: "Reebok", model: "Club C 85", size: "40", color: "Blanco Tiza", buyPrice: 150, sellPrice: 280, initialStock: 9, inputs: 0, outputs: 0 },
            { code: "ZAP-014", brand: "Nike", model: "Dunk Low Panda", size: "42", color: "Negro/Blanco", buyPrice: 250, sellPrice: 460, initialStock: 18, inputs: 0, outputs: 0 },
            { code: "ZAP-015", brand: "Adidas", model: "Forum Low", size: "41", color: "Blanco/Azul", buyPrice: 190, sellPrice: 340, initialStock: 6, inputs: 0, outputs: 0 },
            { code: "ZAP-016", brand: "Under Armour", model: "HOVR Phantom 3", size: "44", color: "Rojo", buyPrice: 260, sellPrice: 430, initialStock: 4, inputs: 0, outputs: 0 },
            { code: "ZAP-017", brand: "Salomon", model: "XT-6 Exp", size: "42", color: "Multicolor", buyPrice: 420, sellPrice: 690, initialStock: 3, inputs: 0, outputs: 0 },
            { code: "ZAP-018", brand: "Brooks", model: "Ghost 15", size: "43", color: "Azul Marino", buyPrice: 270, sellPrice: 440, initialStock: 8, inputs: 0, outputs: 0 },
            { code: "ZAP-019", brand: "Saucony", model: "Jazz Original", size: "40", color: "Gris", buyPrice: 130, sellPrice: 230, initialStock: 11, inputs: 0, outputs: 0 },
            { code: "ZAP-020", brand: "Fila", model: "Disruptor II", size: "37", color: "Blanco", buyPrice: 120, sellPrice: 220, initialStock: 13, inputs: 0, outputs: 0 }
        ];

        // REFERENCIAS DEL DOM
        const tbody = document.getElementById('inventory-tbody');
        const searchInput = document.getElementById('search-input');
        const filterStock = document.getElementById('filter-stock');
        const inputProductSelect = document.getElementById('input-product-code');
        const outputProductSelect = document.getElementById('output-product-code');
        
        // Elementos KPI
        const kpiTotalModels = document.getElementById('kpi-total-models');
        const kpiTotalStock = document.getElementById('kpi-total-stock');
        const kpiTotalInputs = document.getElementById('kpi-total-inputs');
        const kpiTotalOutputs = document.getElementById('kpi-total-outputs');
        const kpiTotalProfit = document.getElementById('kpi-total-profit');

        // FECHA ACTUAL EN EL HEADER
        document.getElementById('current-date').innerText = new Date().toLocaleDateString('es-ES', {
            weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
        });

        // INICIALIZACIÓN
        window.addEventListener('DOMContentLoaded', () => {
            renderTable();
            populateSelects();
            updateKPIs();
        });

        // CALCULO DINÁMICO DE STOCK ACTUAL
        function getActualStock(item) {
            return item.initialStock + item.inputs - item.outputs;
        }

        // RENDERIZAR LA TABLA CON FILTROS Y BÚSQUEDA
        function renderTable() {
            tbody.innerHTML = '';
            const searchTerm = searchInput.value.toLowerCase();
            const stockFilterValue = filterStock.value;

            inventory.forEach(item => {
                const actualStock = getActualStock(item);
                const matchesSearch = item.brand.toLowerCase().includes(searchTerm) || item.model.toLowerCase().includes(searchTerm);
                
                let matchesFilter = true;
                if (stockFilterValue === 'low') {
                    matchesFilter = actualStock < 5;
                } else if (stockFilterValue === 'ok') {
                    matchesFilter = actualStock >= 5;
                }

                if (matchesSearch && matchesFilter) {
                    const tr = document.createElement('tr');
                    
                    // Alerta visual de stock crítico
                    let statusBadge = `<span class="badge badge-success">Óptimo</span>`;
                    if (actualStock === 0) {
                        statusBadge = `<span class="badge badge-danger">Agotado</span>`;
                    } else if (actualStock < 5) {
                        statusBadge = `<span class="badge badge-warning">Stock Bajo</span>`;
                    }

                    tr.innerHTML = `
                        <td><strong>${item.code}</strong></td>
                        <td>${item.brand}</td>
                        <td>${item.model}</td>
                        <td>${item.size}</td>
                        <td>${item.color}</td>
                        <td>S/. ${item.buyPrice.toFixed(2)}</td>
                        <td>S/. ${item.sellPrice.toFixed(2)}</td>
                        <td>${item.initialStock}</td>
                        <td style="color: var(--success); font-weight: 500;">+${item.inputs}</td>
                        <td style="color: var(--danger); font-weight: 500;">-${item.outputs}</td>
                        <td style="font-weight: 700; background-color: ${actualStock < 5 ? '#fffbeb' : 'transparent'}">${actualStock}</td>
                        <td>${statusBadge}</td>
                    `;
                    tbody.appendChild(tr);
                }
            });
        }

        // RELLENAR LOS SELECTS DE LOS FORMULARIOS
        function populateSelects() {
            inputProductSelect.innerHTML = '';
            outputProductSelect.innerHTML = '';

            inventory.forEach(item => {
                const optionText = `${item.code} - ${item.brand} ${item.model} (Talla: ${item.size})`;
                
                const optionIn = document.createElement('option');
                optionIn.value = item.code;
                optionIn.textContent = optionText;
                inputProductSelect.appendChild(optionIn);

                const optionOut = document.createElement('option');
                optionOut.value = item.code;
                optionOut.textContent = optionText;
                outputProductSelect.appendChild(optionOut);
            });
        }

        // ACTUALIZAR CUADRO DE MANDOS (KPIs)
        function updateKPIs() {
            let totalModels = inventory.length;
            let totalStock = 0;
            let totalInputs = 0;
            let totalOutputs = 0;
            let totalProfit = 0;

            inventory.forEach(item => {
                const currentStock = getActualStock(item);
                totalStock += currentStock;
                totalInputs += item.inputs;
                totalOutputs += item.outputs;
                
                // Ganancia potencial basada en el stock actual disponible para venta
                const unitProfit = item.sellPrice - item.buyPrice;
                totalProfit += (currentStock * unitProfit);
            });

            kpiTotalModels.textContent = totalModels;
            kpiTotalStock.textContent = totalStock;
            kpiTotalInputs.textContent = totalInputs;
            kpiTotalOutputs.textContent = totalOutputs;
            kpiTotalProfit.textContent = `S/. ${totalProfit.toLocaleString('es-PE', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;
        }

        // EVENTOS DE BÚSQUEDA Y FILTRADO
        searchInput.addEventListener('input', renderTable);
        filterStock.addEventListener('change', renderTable);

        // FORMULARIO: PROCESAR ENTRADA
        document.getElementById('form-entrada').addEventListener('submit', function(e) {
            e.preventDefault();
            const code = inputProductSelect.value;
            const qty = parseInt(document.getElementById('input-quantity').value);

            const product = inventory.find(item => item.code === code);
            if (product) {
                product.inputs += qty;
                alert(`Entrada registrada con éxito: +${qty} unidades para ${product.brand} ${product.model}.`);
                
                // Reset e interactividad
                this.reset();
                renderTable();
                updateKPIs();
            }
        });

        // FORMULARIO: PROCESAR SALIDA
        document.getElementById('form-salida').addEventListener('submit', function(e) {
            e.preventDefault();
            const code = outputProductSelect.value;
            const qty = parseInt(document.getElementById('output-quantity').value);

            const product = inventory.find(item => item.code === code);
            if (product) {
                const stockDisponible = getActualStock(product);
                
                // Control/Validación de quiebre de stock
                if (qty > stockDisponible) {
                    alert(`Error: No puedes registrar la salida. El stock actual de este modelo es de ${stockDisponible} unidades.`);
                    return;
                }

                product.outputs += qty;
                alert(`Salida registrada con éxito: -${qty} unidades para ${product.brand} ${product.model}.`);
                
                // Reset e interactividad
                this.reset();
                renderTable();
                updateKPIs();
            }
        });
    </script>
</body>
</html>
