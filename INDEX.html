<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escáner QR Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js" integrity="sha512-r6rDA7W6ZeQhvl8S7yRVQUKVxpoxFM6nFZFiW7Xfp77psDdmsUrm95bQM4FmZwMEu4c575spc65XHsasXMLy1g==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --background: #f8fafc;
            --surface: #ffffff;
            --text: #1e293b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--background);
            color: var(--text);
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: var(--surface);
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
        }

        h1 {
            font-size: 1.5rem;
            text-align: center;
            margin-bottom: 20px;
        }

        .scanner-container {
            width: 100%;
            overflow: hidden;
            border-radius: 12px;
            background: #000;
            position: relative;
        }

        /* Ocultamos los botones por defecto de la librería para usar el nuestro */
        #reader button, #reader select {
            display: none !important;
        }
        #reader {
            border: none !important;
        }

        .btn {
            display: block;
            width: 100%;
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 14px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 15px;
            transition: background 0.2s;
        }

        .btn:hover {
            background-color: var(--primary-hover);
        }

        .btn-stop {
            background-color: #ef4444;
        }
        .btn-stop:hover {
            background-color: #dc2626;
        }

        .history-section {
            margin-top: 25px;
        }

        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .clear-btn {
            background: none;
            border: none;
            color: #64748b;
            cursor: pointer;
            font-size: 0.875rem;
            text-decoration: underline;
        }

        .history-list {
            list-style: none;
            max-height: 250px;
            overflow-y: auto;
        }

        .history-item {
            background: #f1f5f9;
            padding: 10px 12px;
            border-radius: 6px;
            margin-bottom: 8px;
            font-size: 0.9rem;
            border-left: 4px solid var(--primary);
            word-break: break-all;
        }

        .timestamp {
            display: block;
            font-size: 0.75rem;
            color: #64748b;
            margin-top: 4px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Escáner QR con Historial</h1>
        
        <div class="scanner-container">
            <div id="reader"></div>
        </div>

        <button id="actionBtn" class="btn">Activar Cámara</button>

        <div class="history-section">
            <div class="history-header">
                <h3>Escaneos Recientes</h3>
                <button id="clearBtn" class="clear-btn">Limpiar todo</button>
            </div>
            <ul id="historyList" class="history-list">
                </ul>
        </div>
    </div>

    <script>
        const actionBtn = document.getElementById('actionBtn');
        const clearBtn = document.getElementById('clearBtn');
        const historyList = document.getElementById('historyList');
        
        // Inicializamos el objeto del escáner en el div 'reader'
        const html5QrCode = new Html5Qrcode("reader");
        let isScanning = false;

        // Configuración del escáner
        const qrConfig = { fps: 10, qrbox: { width: 250, height: 250 } };

        // Cargar historial al iniciar la página
        document.addEventListener('DOMContentLoaded', loadHistory);

        actionBtn.addEventListener('click', () => {
            if (!isScanning) {
                startScanner();
            } else {
                stopScanner();
            }
        });

        clearBtn.addEventListener('click', () => {
            if(confirm('¿Seguro que deseas borrar el historial?')) {
                localStorage.removeItem('qrHistory');
                renderHistory();
            }
        });

        function startScanner() {
            // 'environment' prioriza la cámara trasera en dispositivos móviles
            html5QrCode.start(
                { facingMode: "environment" }, 
                qrConfig,
                onScanSuccess
            ).then(() => {
                isScanning = true;
                actionBtn.textContent = "Apagar Cámara";
                actionBtn.classList.add('btn-stop');
            }).catch(err => {
                alert("Error al acceder a la cámara. Asegúrate de dar permisos y usar HTTPS.");
                console.error(err);
            });
        }

        function stopScanner() {
            html5QrCode.stop().then(() => {
                isScanning = false;
                actionBtn.textContent = "Activar Cámara";
                actionBtn.classList.remove('btn-stop');
            }).catch(err => console.error("Error al detener el escáner", err));
        }

        function onScanSuccess(decodedText, decodedResult) {
            // Detener el escáner inmediatamente tras una lectura exitosa (evita lecturas dobles)
            stopScanner();
            
            // Vibración ligera si el dispositivo lo soporta
            if (navigator.vibrate) navigator.vibrate(100);

            // Obtener fecha y hora actual formateada
            const now = new Date();
            const dateTimeStr = now.toLocaleDateString() + ' ' + now.toLocaleTimeString();

            // Guardar en el almacenamiento local (LocalStorage)
            saveToStorage(decodedText, dateTimeStr);
            
            // Actualizar la interfaz
            renderHistory();
        }

        function saveToStorage(text, datetime) {
            let history = JSON.parse(localStorage.getItem('qrHistory')) || [];
            // Insertamos al principio para que el más reciente salga arriba
            history.unshift({ text, datetime });
            localStorage.setItem('qrHistory', JSON.stringify(history));
        }

        function loadHistory() {
            renderHistory();
        }

        function renderHistory() {
            historyList.innerHTML = '';
            const history = JSON.parse(localStorage.getItem('qrHistory')) || [];
            
            if (history.length === 0) {
                historyList.innerHTML = '<li class="history-item" style="border:none; text-align:center; color:#64748b;">No hay registros aún.</li>';
                return;
            }

            history.forEach(item => {
                const li = document.createElement('li');
                li.className = 'history-item';
                
                // Si el texto es un enlace, lo hacemos clickeable
                if (item.text.startsWith('http://') || item.text.startsWith('https://')) {
                    li.innerHTML = `<a href="${item.text}" target="_blank" style="color: var(--primary); font-weight: 500;">${item.text}</a>`;
                } else {
                    li.innerHTML = `<strong>Dato:</strong> ${item.text}`;
                }

                li.innerHTML += `<span class="timestamp">${item.datetime}</span>`;
                historyList.appendChild(li);
            });
        }
    </script>
</body>
</html>
